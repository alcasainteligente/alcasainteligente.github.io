name: Deploy para GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Instalar dependências
        run: npm ci
      
      - name: Build do projeto
        run: npm run build
      
      - name: Adicionar CNAME
        run: echo 'www.alcasainteligente.pt' > ./dist/CNAME
      
      - name: Upload para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4